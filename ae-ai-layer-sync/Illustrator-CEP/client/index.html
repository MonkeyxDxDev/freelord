<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LayerSync</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="row">
        <button id="pushBtn">Push &#8594; After Effects</button>
        <button id="pullBtn">Pull &#8592; After Effects</button>
    </div>
    <div class="row">
        <button id="testBtn">Test Connection</button>

        <textarea id="logBox" readonly></textarea>
    </div>
    <script src="main.js"></script>
</body>
</html>
